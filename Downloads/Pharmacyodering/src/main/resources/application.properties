spring.application.name=Pharmacyodering

# Database configuration - H2 for development (switch to MySQL for production)
spring.datasource.url=${DB_URL:jdbc:h2:mem:pharmacy}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:akshitha123}

# H2 Console (optional - for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# JWT configuration
jwt.secret=${JWT_SECRET:change-this-secret}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Springdoc OpenAPI configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Ensure schema/data scripts run with JPA auto DDL
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
