spring.application.name=Pharmacyodering

# Database configuration - MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pharmacy?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Djaadhi_09}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT configuration
jwt.secret=${JWT_SECRET:change-this-secret}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Springdoc OpenAPI configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Ensure schema/data scripts run with JPA auto DDL
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
